# Recipe: Mistral-Small-4-119B-NVFP4
# MoE (119B total, ~6.5B active) with MLA attention, NVFP4 quantization
# DGX Spark / SM120 Blackwell

recipe_version: "1"
name: Mistral-Small-4-119B-NVFP4
description: vLLM serving Mistral-Small-4-119B-2603-NVFP4 with MLA + FlashInfer CUTLASS MoE

# HuggingFace model to download (optional, for --download-model)
model: mistralai/Mistral-Small-4-119B-2603-NVFP4

# Container image to use
container: vllm-nvfp4-k64-tf5

build_args:
  - --tf5
  - --rebuild-flashinfer

# Mods — E2M1/FLA fixes for SM120 NVFP4 MoE + Mistral guidance (PR #37081)
mods:
  - mods/fix-e2m1-sm121
  - mods/fix-fla-sm121
  - mods/fix-mistral-reasoning
  - mods/fix-mistral-tool-role
  - mods/fix-mistral-guidance

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 262144
  max_num_batched_tokens: 16384

# Environment variables
env:
  VLLM_NVFP4_GEMM_BACKEND: "cutlass"
  VLLM_USE_FLASHINFER_MOE_FP4: 1
  VLLM_FLASHINFER_MOE_BACKEND: "throughput"
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: "1"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  NCCL_P2P_DISABLE: "1"
  OMP_NUM_THREADS: "6"
  CUDA_DEVICE_MAX_CONNECTIONS: "32"
  VLLM_USE_FLASHINFER_SAMPLER: "0"
  VLLM_WORKER_MULTIPROC_METHOD: "spawn"

# The vLLM serve command template
command: |
  vllm serve mistralai/Mistral-Small-4-119B-2603-NVFP4 \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --enable-prefix-caching \
    --enable-auto-tool-choice \
    --tool-call-parser mistral \
    --reasoning-parser mistral \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --trust-remote-code \
    -tp {tensor_parallel} \
    --max-num-seqs 128 \
    --kv-cache-dtype fp8 \
    --attention-backend TRITON_MLA
