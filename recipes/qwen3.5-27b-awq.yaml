# Recipe: Qwen3.5-27B-AWQ
# Qwen3.5-27B dense model in AWQ quantization

recipe_version: "1"
name: Qwen3.5-27B-AWQ
description: vLLM serving Qwen3.5-27B-AWQ

# HuggingFace model to download (optional, for --download-model)
model: QuantTrio/Qwen3.5-27B-AWQ

# Container image to use
container: vllm-node-tf5

build_args:
  - --tf5

# Mod required to fix ROPE syntax error and chat template
mods:
  - mods/fix-qwen3.5-autoround
  - mods/fix-qwen3.5-chat-template

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.7
  max_model_len: 262144
  max_num_batched_tokens: 16384

# Environment variables
env:
  VLLM_MARLIN_USE_ATOMIC_ADD: 1
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: 1
  VLLM_USE_DEEP_GEMM: 0
  VLLM_FLASHINFER_FORCE_TENSOR_CORES: 1
  #VLLM_USE_FLASHINFER_MOE_FP16: 1
  VLLM_USE_FLASHINFER_SAMPLER: 0

# The vLLM serve command template
command: |
  vllm serve QuantTrio/Qwen3.5-27B-AWQ \
    --served-model-name Qwen3.5-27B-AWQ \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --load-format fastsafetensors \
    --enable-prefix-caching \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --reasoning-parser qwen3 \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --trust-remote-code \
    --chat-template unsloth.jinja \
    --kv-cache-dtype fp8_e4m3 \
    -tp {tensor_parallel} \
    --optimization-level 3 \
    --performance-mode interactive \
    --mamba-cache-mode align \
    --mamba-block-size 8 \
    --speculative-config '{{"method":"mtp","num_speculative_tokens":2}}' \
    --override-generation-config '{{"temperature": 0.60, "top_p": 0.95, "top_k": 20, "min_p": 0.0, "presence_penalty": 0.0, "repetition_penalty": 1.0, "max_tokens": 16384}}'
