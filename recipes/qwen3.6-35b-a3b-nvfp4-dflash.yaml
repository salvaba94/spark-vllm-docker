# Qwen3.6 NVFP4 with the Qwen DFlash speculative draft model.

recipe_version: "1"
name: Qwen3.6-35B-A3B-NVFP4-DFlash-Arena-Solo
description: Single-node Qwen3.6 NVFP4 with z-lab Qwen DFlash speculative decoding
model: nvidia/Qwen3.6-35B-A3B-NVFP4

solo_only: true
container: vllm-node

build_args:
  - --apply-vllm-pr
  - "40898"
  - --apply-preset-vllm-prs

mods:
  - mods/fix-qwen3.6-chat-template

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.65
  max_model_len: 262144
  max_num_seqs: 4
  max_num_batched_tokens: 32768
  num_speculative_tokens: 15

env:
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"

command: |
  vllm serve nvidia/Qwen3.6-35B-A3B-NVFP4 \
    --host {host} \
    --port {port} \
    --tensor-parallel-size {tensor_parallel} \
    --trust-remote-code \
    --kv-cache-dtype fp8 \
    --attention-backend flash_attn \
    --moe-backend marlin \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-model-len {max_model_len} \
    --max-num-seqs {max_num_seqs} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --enable-chunked-prefill \
    --async-scheduling \
    --enable-prefix-caching \
    --speculative-config '{{"method":"dflash","model":"z-lab/Qwen3.6-35B-A3B-DFlash","num_speculative_tokens":{num_speculative_tokens}}}' \
    --load-format fastsafetensors \
    --reasoning-parser qwen3 \
    --tool-call-parser qwen3_xml \
    --enable-auto-tool-choice
