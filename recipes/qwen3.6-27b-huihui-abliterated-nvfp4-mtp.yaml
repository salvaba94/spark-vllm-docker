# Spark Arena fastest single-node dense Qwen3.6 27B NVFP4 entry:
# 44.09 decode tokens/s at tg128 @ d16384 (c2).

recipe_version: "1"
name: Qwen3.6-27B-Huihui-Abliterated-NVFP4-MTP-Arena-Solo
description: Dense Qwen3.6 27B NVFP4 with native MTP k=3 and FlashInfer
model: sakamakismile/Huihui-Qwen3.6-27B-abliterated-NVFP4-MTP

solo_only: true
container: vllm-node

mods:
  - mods/fix-qwen3.6-chat-template

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.5
  max_model_len: 262144
  max_num_batched_tokens: 4096
  max_num_seqs: 3
  num_speculative_tokens: 3

env:
  TRITON_CACHE_DIR: /workspace/.triton_cache
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  VLLM_ENGINE_ITERATION_TIMEOUT_S: "60"
  VLLM_USE_XGRAMMAR: "0"

command: |
  vllm serve sakamakismile/Huihui-Qwen3.6-27B-abliterated-NVFP4-MTP \
    --host {host} \
    --port {port} \
    --served-model-name qwen3.6-27b \
    --tensor-parallel-size {tensor_parallel} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --kv-cache-dtype fp8 \
    --attention-backend flashinfer \
    --trust-remote-code \
    --enable-prefix-caching \
    --enable-auto-tool-choice \
    --reasoning-parser qwen3 \
    --tool-call-parser qwen3_xml \
    --default-chat-template-kwargs '{{"preserve_thinking":true}}' \
    --speculative-config '{{"method":"mtp","num_speculative_tokens":{num_speculative_tokens}}}'
