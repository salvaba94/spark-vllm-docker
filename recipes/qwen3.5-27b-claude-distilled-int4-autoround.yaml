# Recipe: Qwen3.5-27B-INT4-Autoround
# Qwen3.5-27B dense model in Intel INT4-Autoround quantization

recipe_version: "1"
name: Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-INT4-Autoround
description: vLLM serving Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-INT4-Autoround

# HuggingFace model to download (optional, for --download-model)
model: salbeal/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-int4-AutoRound

# Container image to use
container: vllm-node-tf5

build_args:
  - --tf5

# Mod required to fix ROPE syntax error and chat template
mods:
  - mods/fix-qwen3.5-autoround
  - mods/fix-qwen3.5-chat-template

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.5
  max_model_len: 262144
  max_num_batched_tokens: 8192

# Environment variables
env:
  VLLM_MARLIN_USE_ATOMIC_ADD: 1

# The vLLM serve command template
command: |
  vllm serve salbeal/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-int4-AutoRound \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --load-format fastsafetensors \
    --enable-prefix-caching \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --reasoning-parser qwen3 \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --trust-remote-code \
    --chat-template unsloth.jinja \
    --kv-cache-dtype fp8_e4m3 \
    --calculate-kv-scales \
    -tp {tensor_parallel} \
    --speculative-config '{{"method":"mtp","num_speculative_tokens":2}}'
