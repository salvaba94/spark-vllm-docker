# Recipe: Qwen/Qwen3.5-35B-A3B-FP8
# Qwen/Qwen3.5-35B-A3B model in native FP8 format


recipe_version: "1"
name: Qwen35-35B-A3B
description: vLLM serving Qwen3.5-35B-A3B-FP8

# HuggingFace model to download (optional, for --download-model)
model: Qwen/Qwen3.5-35B-A3B-FP8

solo_only: true

# Container image to use
container: vllm-node-tf5

build_args:
  - --tf5


# Mod required to fix slowness and crash in the cluster (tracking https://github.com/vllm-project/vllm/issues/33857)
mods:
  - mods/fix-qwen3-coder-next
  - mods/fix-qwen3.5-chat-template

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.6
  max_model_len: 262144
  max_num_batched_tokens: 32768

# Environment variables
env: 
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: '1'
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'

# The vLLM serve command template
command: |
  vllm serve Qwen/Qwen3.5-35B-A3B-FP8 \
    --served-model-name Qwen3.5-35B-A3B-FP8 \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --reasoning-parser qwen3 \
    --kv-cache-dtype fp8 \
    --load-format fastsafetensors \
    --attention-backend FLASHINFER \
    --enable-prefix-caching \
    --chat-template unsloth.jinja \
    -tp {tensor_parallel} \
    --optimization-level 3 \
    --performance-mode throughput \
    --mamba-cache-mode align \
    --max_num_seqs 10 \
    --max_cudagraph_capture_size 10 \
    --mamba_ssm_cache_dtype float16 \
    --speculative-config '{{"method":"mtp","num_speculative_tokens":2}}' \
    --override-generation-config '{{"temperature": 0.60, "top_p": 0.95, "top_k": 20, "min_p": 0.0, "presence_penalty": 0.0, "repetition_penalty": 1.0, "max_tokens": 16384}}'
