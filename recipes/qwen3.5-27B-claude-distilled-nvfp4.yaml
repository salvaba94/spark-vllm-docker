# Recipe: Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-NVFP4
# Uses CUTLASS kernels for NVFP4
recipe_version: "1"
name: Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-NVFP4
description: vLLM serving Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-NVFP4 using CUTLASS kernels

model: mconcat/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-NVFP4
cluster_only: false
solo_only: false

mods:
  - mods/fix-qwen3.5-chat-template
  - mods/fix-qwen3-coder-next

env:
  VLLM_USE_FLASHINFER_MOE_MXFP4_MXFP8: "1"
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: 1

container: vllm-node-mxfp4

build_args:
  - --exp-mxfp4
  - --tf5

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.4
  max_model_len: 262144
  max_num_seqs: 10

command: |
  vllm serve mconcat/Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-NVFP4 \
  --kv-cache-dtype fp8_e4m3 \
  --calculate-kv-scales \
  --mxfp4-backend CUTLASS \
  --mxfp4-layers moe,qkv,o,lm_head \
  --trust-remote-code \
  --gpu-memory-utilization {gpu_memory_utilization} \
  --max-model-len {max_model_len} \
  --max-num-seqs {max_num_seqs} \
  --enable-prefix-caching \
  --host {host} \
  --port {port} \
  --enable-auto-tool-choice \
  --load-format fastsafetensors \
  --tool-call-parser qwen3_coder \
  --reasoning-parser qwen3 \
  --chat-template unsloth.jinja \
  --tensor-parallel-size {tensor_parallel} \
  --attention-backend FLASHINFER \
  --distributed-executor-backend ray