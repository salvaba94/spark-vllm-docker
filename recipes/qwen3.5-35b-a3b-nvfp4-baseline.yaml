# Recipe: Qwen3.5-35B-A3B-NVFP4 (baseline)
# Baseline WITHOUT FLA SM121 optimizations for A/B comparison

recipe_version: "1"
name: Qwen3.5-35B-A3B-NVFP4-baseline
description: Baseline 35B NVFP4 without FLA optimization

model: Sehyo/Qwen3.5-35B-A3B-NVFP4

container: vllm-nvfp4-k64-tf5

mods:
  - mods/fix-e2m1-sm121
  - mods/fix-qwen3.5-chat-template

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 32768
  max_num_batched_tokens: 4096

env:
  VLLM_NVFP4_GEMM_BACKEND: "cutlass"
  VLLM_USE_FLASHINFER_MOE_FP4: 1
  VLLM_FLASHINFER_MOE_BACKEND: "throughput"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  NCCL_P2P_DISABLE: "1"
  OMP_NUM_THREADS: "6"
  CUDA_DEVICE_MAX_CONNECTIONS: "32"
  VLLM_USE_FLASHINFER_SAMPLER: "0"
  VLLM_WORKER_MULTIPROC_METHOD: "spawn"

command: |
  vllm serve Sehyo/Qwen3.5-35B-A3B-NVFP4 \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --no-enable-prefix-caching \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --trust-remote-code \
    --chat-template unsloth.jinja \
    -tp {tensor_parallel} \
    --max-num-seqs 64 \
    --attention-backend flashinfer
