# Recipe: Qwen3.5-122B-A10B-NVFP4
# Sehyo's NVFP4 quantization of Qwen3.5-122B
# Optimized for SM120 Blackwell workstation GPUs (RTX PRO 6000, RTX 5090, DGX Spark)
# Requires FlashInfer PR #2786 (K=64 CUTLASS kernel fix for SM120 SMEM)

recipe_version: "1"
name: Qwen3.5-122B-A10B-NVFP4
description: vLLM serving Qwen3.5-122B-A10B-NVFP4 with K=64 CUTLASS kernel fix for SM120

# HuggingFace model to download (optional, for --download-model)
model: sehyo/Qwen3.5-122B-A10B-NVFP4

# Container image to use
container: vllm-node-tf5

build_args:
  - --tf5
  - --rebuild-flashinfer

# Mods required for Qwen3.5
mods:
  - mods/fix-qwen3.5-autoround
  - mods/fix-qwen3.5-chat-template

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 262144
  max_num_batched_tokens: 8192

# Environment variables
env:
  NCCL_P2P_DISABLE: "1"
  OMP_NUM_THREADS: "6"
  CUDA_DEVICE_MAX_CONNECTIONS: "32"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  VLLM_USE_FLASHINFER_SAMPLER: "0"
  VLLM_WORKER_MULTIPROC_METHOD: "spawn"

# The vLLM serve command template
command: |
  vllm serve sehyo/Qwen3.5-122B-A10B-NVFP4 \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --enable-prefix-caching \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --reasoning-parser qwen3 \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --trust-remote-code \
    --chat-template unsloth.jinja \
    -tp {tensor_parallel} \
    --max-num-seqs 32
