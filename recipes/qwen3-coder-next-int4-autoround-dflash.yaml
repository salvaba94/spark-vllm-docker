recipe_version: "1"
name: Qwen3-Coder-Next-INT4-AutoRound-DFlash-Solo
description: Qwen3-Coder-Next INT4 AutoRound with the z-lab DFlash drafter
model: Intel/Qwen3-Coder-Next-int4-AutoRound
solo_only: true
container: vllm-node

mods:
  - mods/fix-qwen3-next-autoround

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.6
  max_model_len: 262144
  max_num_batched_tokens: 32768
  max_num_seqs: 4
  num_speculative_tokens: 15

env:
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"

command: |
  vllm serve Intel/Qwen3-Coder-Next-int4-AutoRound \
    --host {host} \
    --port {port} \
    --tensor-parallel-size {tensor_parallel} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --load-format fastsafetensors \
    --attention-backend flash_attn \
    --enable-prefix-caching \
    --enable-chunked-prefill \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --trust-remote-code \
    --speculative-config '{{"method":"dflash","model":"z-lab/Qwen3-Coder-Next-DFlash","num_speculative_tokens":{num_speculative_tokens}}}'
